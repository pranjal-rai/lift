<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b0d10" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Lift" />
<title>Lift — Workout Tracker</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <!-- Top header (per-view) -->
  <header id="topbar"></header>

  <!-- Main view container -->
  <main id="view"></main>

  <!-- Bottom navigation -->
  <nav id="bottomnav">
    <button data-route="today" class="navbtn active">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2l1.5 4.5H18l-3.6 2.6 1.4 4.3L12 10.8l-3.8 2.6 1.4-4.3L6 6.5h4.5z"/></svg>
      <span>Today</span>
    </button>
    <button data-route="history" class="navbtn">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M13 3a9 9 0 100 18 9 9 0 000-18zm-1 5h2v5l4 2-1 1.7-5-3z"/></svg>
      <span>History</span>
    </button>
    <button data-route="templates" class="navbtn">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/></svg>
      <span>Templates</span>
    </button>
    <button data-route="progress" class="navbtn">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 17l6-6 4 4 8-8v4h2V3h-7v2h4l-7 7-4-4-8 8z"/></svg>
      <span>Progress</span>
    </button>
    <button data-route="body" class="navbtn">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2a3 3 0 100 6 3 3 0 000-6zm-4 8h8l1 5h-3v7h-4v-7H7z"/></svg>
      <span>Body</span>
    </button>
  </nav>

  <!-- Modal host -->
  <div id="modal-root"></div>
  <div id="toast-root"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
